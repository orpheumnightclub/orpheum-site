<main class="tables-page">
    <section class="tables-hero">
        <h1 class="tables-hero__title">Карта столів</h1>
        <p class="tables-hero__subtitle">Оберіть зону та стіл для бронювання</p>
    </section>

    <section class="tables-controls">
        <div class="floor-switcher">
            <button class="floor-btn active" data-floor="1">1 Поверх</button>
            <button class="floor-btn" data-floor="2">2 Поверх (VIP)</button>
        </div>
        <div class="tables-legend">
            <span class="legend-item"><span class="legend-dot legend-dot--free"></span> Вільний</span>
            <span class="legend-item"><span class="legend-dot legend-dot--booked"></span> Заброньовано</span>
            <span class="legend-item"><span class="legend-dot legend-dot--reserved"></span> Зарезервовано</span>
            <span class="legend-item"><span class="legend-dot legend-dot--sold"></span> Продано</span>
        </div>
        <button class="table-btn table-btn--close-shift" id="closeShiftBtn" style="display:none">Закрити зміну</button>
    </section>

    <section class="tables-map-wrapper">
        <div class="tables-map" id="tablesMap">
            <div class="tables-floor active" id="floor1"></div>
            <div class="tables-floor" id="floor2"></div>
        </div>
    </section>

    <div class="table-info-panel" id="tableInfoPanel">
        <div class="table-info-panel__header">
            <h3 id="tableInfoTitle">Стіл №1</h3>
            <button class="table-info-panel__close" id="closePanel">&times;</button>
        </div>
        <div class="table-info-panel__body">
            <p id="tableInfoZone">Зона: Стандарт</p>
            <p id="tableInfoSeats">Місць: 4</p>
            <p id="tableInfoStatus">Статус: Вільний</p>
            <p id="tableInfoBooked" style="display:none">Заброньовано на: <span id="tableInfoBookedDetails"></span></p>
        </div>
        <div class="table-info-panel__actions">
            <button class="table-btn table-btn--book" id="bookTableBtn" style="display:none">Забронювати</button>
        </div>
    </div>
</main>

<div id="bookingModal" class="modal" style="display:none">
    <div class="modal__content">
        <div class="modal__header">
            <h3>Бронювання стола</h3>
            <button class="modal__close" id="closeModal">&times;</button>
        </div>
        <form id="tableBookingForm" class="modal__form">
            <input type="hidden" id="bookTableId">
            <div class="booking__form-group">
                <label for="bookName">Ім'я</label>
                <input type="text" id="bookName" placeholder="Ваше ім'я" required>
                <span class="booking__error" id="bookNameError"></span>
            </div>
            <div class="booking__form-group">
                <label for="bookPhone">Телефон</label>
                <input type="tel" id="bookPhone" placeholder="+38 (0__) ___-__-__" required>
                <span class="booking__error" id="bookPhoneError"></span>
            </div>
            <div class="booking__form-group">
                <label>Дата</label>
                <div class="date-pickers">
                    <select id="bookDay" required>
                        <option value="">День</option>
                    </select>
                    <select id="bookMonth" required>
                        <option value="">Місяць</option>
                    </select>
                    <select id="bookYear" required>
                        <option value="">Рік</option>
                    </select>
                </div>
                <input type="hidden" id="bookDate">
                <span class="booking__error" id="bookDateError"></span>
            </div>
            <div class="booking__form-group">
                <label for="bookTime">Час</label>
                <select id="bookTime" required>
                    <option value="">Оберіть час</option>
                    <option value="22:00">22:00</option>
                    <option value="23:00">23:00</option>
                    <option value="00:00">00:00</option>
                    <option value="01:00">01:00</option>
                    <option value="02:00">02:00</option>
                    <option value="03:00">03:00</option>
                </select>
                <span class="booking__error" id="bookTimeError"></span>
            </div>
            <div class="booking__form-group">
                <label for="bookGuests">Кількість місць</label>
                <select id="bookGuests" required>
                    <option value="">Оберіть кількість</option>
                </select>
                <span class="booking__error" id="bookGuestsError"></span>
            </div>
            <button type="submit" class="modal__submit" id="bookSubmitBtn">Забронювати</button>
        </form>
    </div>
</div>

<div id="sellModal" class="modal" style="display:none">
    <div class="modal__content">
        <div class="modal__header">
            <h3>Продаж стола</h3>
            <button class="modal__close" id="closeSellModal">&times;</button>
        </div>
        <form id="sellForm" class="modal__form">
            <input type="hidden" id="sellTableId">
            <input type="hidden" id="sellReservationId">
            <p id="sellTableInfo" style="color:#aaa;margin-bottom:16px"></p>
            <div class="booking__form-group">
                <label for="sellAmount">Сума (грн)</label>
                <input type="number" id="sellAmount" placeholder="0" min="1" required>
            </div>
            <button type="submit" class="modal__submit" id="sellSubmitBtn" style="background:#5a8a20">Підтвердити продаж</button>
        </form>
    </div>
</div>
